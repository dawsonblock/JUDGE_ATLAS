name: Alpha Release Proof

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  alpha-release-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Prepare backend virtual environment
        working-directory: ./backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Verify Docker availability
        run: |
          docker version
          docker info

      - name: Run full alpha release proof gate (Docker/PostGIS required)
        run: |
          bash scripts/package_and_validate_release_archive.sh \
            --archive-path "${RUNNER_TEMP}/JUDGE_ATLAS-main-final.zip"

      - name: Upload current proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpha-release-proof-current
          path: artifacts/proof/current/**
          retention-days: 30

      - name: Upload final distributable archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JUDGE_ATLAS-main-final
          path: ${{ runner.temp }}/JUDGE_ATLAS-main-final.zip
          retention-days: 30
