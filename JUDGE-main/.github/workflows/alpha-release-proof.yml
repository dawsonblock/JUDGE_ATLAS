name: Alpha Release Proof

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    alpha-release-proof:
        runs-on: ubuntu-latest
        timeout-minutes: 90

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: ./frontend/package-lock.json

            - name: Prepare backend virtual environment
              working-directory: ./backend
              run: |
                  python -m venv .venv
                  source .venv/bin/activate
                  python -m pip install --upgrade pip
                  python -m pip install -e ".[test]"

            - name: Install frontend dependencies
              working-directory: ./frontend
              run: npm ci

            - name: Verify Docker availability
              run: |
                  docker version
                  docker info

            - name: Run full alpha release proof gate (Docker/PostGIS required)
              run: |
                  make release-proof-local

            - name: Upload current proof artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: alpha-release-proof-current
                  path: artifacts/proof/current/**
                  retention-days: 30
