# Canada / Saskatchewan-first source registry configuration
# ─────────────────────────────────────────────────────────
# Safety rules enforced for every row:
#   • public_record_authority: "news_context" sources NEVER create CrimeIncident directly
#   • enabled_default: false for all rows — admin must explicitly enable each source
#   • public_publish_default: true only for aggregate / statutory records (StatCan, legislation)
#   • All personal identifiers are excluded; coordinates are area-level only
#
# Relationship with SourceRegistry columns:
#   source_key         → SourceRegistry.source_key (unique, immutable once created)
#   jurisdiction       → SourceRegistry.jurisdiction
#   category           → SourceRegistry.category
#   public_record_authority → SourceRegistry.public_record_authority
#   enabled_default    → SourceRegistry.enabled_default  (seed only; admin overrides preserved)
#   base_url           → SourceRegistry.base_url
#   allowed_domains    → SourceRegistry.allowed_domains  (JSON array, whitelist for web monitor)
#   refresh_interval_minutes → SourceRegistry.refresh_interval_minutes
#   parser             → SourceRegistry.parser
#   creates            → SourceRegistry.creates          (JSON array of record types produced)
#   public_publish_default → SourceRegistry.public_publish_default
#   terms_url          → SourceRegistry.terms_url

sources:

  # ── Saskatchewan / Saskatoon official open data ───────────────────────────

  # RESEARCH NOTE (2026-05-04): opendata.saskatoon.ca (ArcGIS Hub orgId eJz9754Ox6TaFSC2,
  # urlKey CitySaskatoon) publishes 121 Feature Services — all infrastructure (roads, water,
  # snow program, sanitary, arts). Searched crime/police/incident/offence/violation keywords
  # against the org: 0 results in every case. The City of Saskatoon does NOT publish crime
  # incident data via its open data portal. Remains portal_reference until an actual
  # CSV/API dataset appears on opendata.saskatoon.ca.
  - source_key: saskatoon_open_data_crime
    source_name: "City of Saskatoon Open Data – Crime Incidents"
    jurisdiction: "Saskatoon, Saskatchewan, Canada"
    category: crime_statistics
    country: Canada
    province_state: Saskatchewan
    city: Saskatoon
    source_type: crime_incident
    source_tier: official_police_open_data
    public_record_authority: official_open_data
    license: "Open Government Licence – City of Saskatoon"
    license_url: "https://opendata.saskatoon.ca/licence"
    terms_url: "https://opendata.saskatoon.ca/licence"
    base_url: "https://opendata.saskatoon.ca"
    allowed_domains: ["opendata.saskatoon.ca"]
    fetch_method: csv_download
    update_cadence: monthly
    refresh_interval_minutes: 44640
    parser: saskatoon_csv
    creates: ["CrimeIncident"]
    enabled_default: false
    auto_publish_enabled: false
    requires_manual_review: true
    public_publish_default: false
    precision_level: city_block
    priority: 1
    source_class: portal_reference

  # RESEARCH NOTE (2026-05-04): map.saskatoonpolice.ca is the Saskatoon Police Service's
  # crime map (Ext JS 7.7.0 + deck.gl 9.2.3 + Google Maps, Imperva/Incapsula WAF). No public
  # REST API or ArcGIS FeatureServer endpoint is discoverable; the JS bundle is loaded dynamically
  # with no static paths.  The site's ToS (2026) explicitly prohibits:
  #   (1) use for comparison over time, (2) use for commercial purposes.
  # Machine ingestion is not legally permissible under these terms.
  # ArcGIS Online search for SPS org returned 0 results — SPS has no public ArcGIS org.
  # Remains portal_reference until SPS publishes an Open Government Licence bulk-download.
  - source_key: saskatoon_police_open_data
    source_name: "Saskatoon Police Service – Open Data Portal"
    jurisdiction: "Saskatoon, Saskatchewan, Canada"
    category: crime_statistics
    country: Canada
