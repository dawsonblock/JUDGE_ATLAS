name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build the backend Docker image
        run: docker build JUDGE-main/backend --file JUDGE-main/backend/Dockerfile.backend --tag judge-backend:$(date +%s)
      - name: Build the frontend Docker image
        run: docker build JUDGE-main/frontend --file JUDGE-main/frontend/Dockerfile --tag judge-frontend:$(date +%s)
